# ─── Target ──────────────────────────────────────────────────
target:
  type: repo                       # repo | api | binary
  path_or_url: ./sample_targets    # local path or URL
  languages_hint:
    - python
  ignore_patterns: []              # extra globs (built-ins: .git, node_modules, etc.)

# ─── Feature toggles ────────────────────────────────────────
features:
  enable_graph: true
  enable_semgrep: false
  enable_codeql: false
  enable_fuzz: true
  enable_sanitizers: false

# ─── Sandbox ─────────────────────────────────────────────────
sandbox:
  enabled: true
  network_off: true                # ALWAYS true in production
  cpu: 1.0
  mem_mb: 512
  timeout_sec: 60

# ─── LLM ─────────────────────────────────────────────────────
llm:
  enabled: false                   # set true + provider/model to activate
  provider: null                   # openai | anthropic | local | dummy
  model: null

# ─── Budget ──────────────────────────────────────────────────
budget:
  max_tokens: null
  max_cost_usd: null
